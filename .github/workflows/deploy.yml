name: Deploy VMC Application

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      # 1. Kéo code mới nhất từ GitHub về máy server
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Cài đặt Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Cài dependencies và Build Frontend (React + Vite → dist/)
      - name: Install & Build Frontend
        run: |
          npm ci
          npm run build

      # 4. Cài dependencies cho Backend Server
      - name: Install Server Dependencies
        run: |
          cd server
          npm install

      # 5. Khởi động lại Server với PM2 (serve cả API lẫn frontend từ dist/)
      - name: Restart Server with PM2
        run: |
          pm2 restart vmc-server || pm2 start server/index.js --name "vmc-server" --cwd . --node-args="--env-file=server/.env"
          pm2 save
          echo "=========================================="
          echo "🎉 Deploy thành công! Server đang chạy."
          echo "=========================================="

      # 6. Kiểm tra log PM2 sau deploy
      - name: Check PM2 logs
        run: |
          sleep 3
          pm2 logs vmc-server --lines 20 --nostream