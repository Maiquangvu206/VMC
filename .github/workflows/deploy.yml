name: Deploy VMC Application

on:
  push:
    branches: [ "main" ] # Đổi thành "master" nếu branch chính của Vũ tên là master

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      # 1. Kéo code mới nhất từ GitHub về máy ASUS
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Cài đặt Node.js môi trường
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Build phần Frontend (React + Vite)
      - name: Install & Build Frontend
        run: |
          npm ci
          npm run build

      # 4. Cài đặt dependencies cho phần Backend (Server)
      - name: Install Server Dependencies
        run: |
          cd server
          npm install

      # 5. Khởi động lại Server/App (Dùng PM2 hoặc chạy trực tiếp)
      - name: Restart Server
        run: |
          echo "=========================================="
          echo "🎉 Build thành công! Dự án đã sẵn sàng."
          echo "=========================================="
          # Nếu Vũ dùng PM2 để quản lý backend thì bỏ dấu # ở dòng dưới:
          # pm2 restart all || pm2 start server/index.js --name "vmc-server"